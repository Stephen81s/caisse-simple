<style>
/* ********************************************************************
   FILE : style_craft.html
   MODULE : Craft Alcool
   VERSION : 1.3.0 — GTARP PRO
   AUTHOR : Stephen
   DESCRIPTION :
      - Cadre 95% centré
      - Cartes dynamiques (auto-fit)
      - Rendu premium, responsive, fluide
********************************************************************* */

/* ============================================================
   🧱 WRAPPER GLOBAL
============================================================ */
#craft-wrapper {
    display: flex;
    flex-direction: column;
    gap: 25px;
    padding: 20px;
    align-items: center;
}

/* ============================================================
   📦 BLOC DE CRAFT (95% + centré)
============================================================ */
.craft-block {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 20px;

    width: 95%;           /* 🔥 cadre = 95% */
    max-width: 1600px;    /* 🔥 limite PRO */
    margin: 0 auto;       /* 🔥 centre le cadre */
}

/* ============================================================
   🏷️ TITRES
============================================================ */
.category-header-center {
    text-align: center;
    font-size: 1.4rem;
    font-weight: bold;
    color: #58a6ff;
    margin-bottom: 15px;
}

/* ============================================================
   🧩 GRID DES CARTES (auto-fit dynamique)
============================================================ */
.craft-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
    gap: 20px;
    margin-bottom: 25px;
}

/* ============================================================
   🪪 CARTE DE CRAFT
============================================================ */
.craft-item {
    display: flex;
    background: #1e1e1e;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 15px;
    gap: 15px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.craft-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 12px #00000055;
}

/* ============================================================
   🖼️ IMAGE
============================================================ */
.craft-img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    border-radius: 6px;
    background: #0d1117;
    padding: 5px;
}

/* ============================================================
   📄 INFO
============================================================ */
.craft-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.craft-info h3 {
    margin: 0;
    font-size: 1.1rem;
    color: #c9d1d9;
}

/* ============================================================
   🧪 INGREDIENTS
============================================================ */
.ingredients-line {
    font-size: 0.9rem;
    opacity: 0.85;
}

.ingredients-label {
    font-weight: bold;
}

.ingredients-calc {
    font-size: 0.85rem;
    color: #58a6ff;
}

/* ============================================================
   🔢 QUANTITÉ
============================================================ */
.qty-selector {
    display: flex;
    align-items: center;
    gap: 8px;
}

.qty-btn {
    background: #21262d;
    color: white;
    border: 1px solid #30363d;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
}

.qty-btn:hover {
    background: #30363d;
}

.qty-input {
    width: 50px;
    padding: 5px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    text-align: center;
}

/* ============================================================
   🛠️ BOUTON CRAFT
============================================================ */
.craft-btn {
    margin-top: 8px;
    padding: 10px;
    background: #1f6feb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.craft-btn:hover {
    background: #1158c7;
}

</style>
