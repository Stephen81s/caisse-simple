<style>
/* ********************************************************************
   FILE : style_banque.html
   MODULE : Banque RP
   VERSION : 1.0.0 — GTARP PRO
   AUTHOR : Stephen
********************************************************************* */

/* ============================================================
   🧱 WRAPPER GLOBAL
============================================================ */
#banque-wrapper {
    display: flex;
    justify-content: center;
    width: 100%;
    margin-top: 20px;
}

/* ============================================================
   📦 CADRE PRINCIPAL (95%)
============================================================ */
.banque-block {
    width: 95%;
    max-width: 1400px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 25px;
}

/* ============================================================
   🏷️ TITRE
============================================================ */
.banque-header {
    text-align: center;
    font-size: 1.8rem;
    font-weight: bold;
    color: #58a6ff;
    margin-bottom: 25px;
}

/* ============================================================
   🏷️ LABELS
============================================================ */
.banque-label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
    font-size: 1rem;
    color: #c9d1d9;
    font-weight: bold;
}

/* ============================================================
   📝 INPUTS & SELECTS
============================================================ */
.banque-input {
    width: 100%;
    padding: 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-size: 1rem;
}

.banque-input:focus {
    outline: none;
    border-color: #58a6ff;
}

/* ============================================================
   🔘 BOUTONS
============================================================ */
.banque-btn-row {
    display: flex;
    gap: 15px;
    margin-top: 25px;
}

.banque-btn-depot,
.banque-btn-retrait {
    flex: 1;
    padding: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    transition: 0.15s ease;
}

/* Dépôt = vert */
.banque-btn-depot {
    background: #2ecc71;
    color: #fff;
}

.banque-btn-depot:hover {
    background: #27ae60;
}

/* Retrait = rouge */
.banque-btn-retrait {
    background: #e74c3c;
    color: #fff;
}

.banque-btn-retrait:hover {
    background: #c0392b;
}

/* ============================================================
   🧾 MESSAGE / RESULTAT
============================================================ */
#banque-resultat {
    font-size: 1rem;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 20px;
    background: #1e1e1e;
    border: 1px solid #30363d;
    color: #c9d1d9;
}
</style>
