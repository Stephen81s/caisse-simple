<script>
console.log("🟦 [index] Script principal chargé.");

let currentPage = null;

/* ============================================================
   NAVIGATION — Mise en surbrillance du bouton actif
============================================================ */
function setActiveNav(pageName) {

    const ids = [
        "nav-accueil",
        "nav-caisse",
        "nav-craft",
        "nav-banque",
        "nav-tchat",
        "nav-articles"
    ];

    ids.forEach(id => document.getElementById(id)?.classList.remove("nav-active"));

    const key = pageName.replace("interface_", "");
    const btn = document.getElementById("nav-" + key);

    if (btn) btn.classList.add("nav-active");
}

/* ============================================================
   NAVIGATION — Chargement dynamique d’une page
============================================================ */
function openPage(pageName) {

    if (currentPage === pageName) {
        console.log("ℹ️ [index] Page déjà active :", pageName);
        return;
    }

    console.log("📄 [index] Demande d’ouverture :", pageName);
    currentPage = pageName;
    setActiveNav(pageName);

    google.script.run
        .withSuccessHandler(html => {

            console.log("🟩 [index] Page reçue :", pageName);

            const frame = document.getElementById("page-frame");

            const temp = document.createElement("div");
            temp.innerHTML = html;

            const scripts = [...temp.querySelectorAll("script")];
            scripts.forEach(s => s.remove());

            frame.innerHTML = temp.innerHTML;

            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                if (oldScript.src) newScript.src = oldScript.src;
                else newScript.textContent = oldScript.textContent;
                frame.appendChild(newScript);
            });

            console.log("🟩 [index] Injection terminée. Appel initPage()…");

            if (typeof initPage === "function") {
                console.log("🟦 [index] initPage() détecté → exécution");
                initPage();
            } else {
                console.warn("🟧 [index] Aucun initPage() trouvé dans le fragment");
            }

        })
        .withFailureHandler(err => {
            console.error("❌ [index] ERREUR lors du chargement :", err);
        })
        .loadPage(pageName);
}

/* ============================================================
   HORLOGE — Mise à jour chaque seconde
============================================================ */
function lancerHorloge() {
    const el = document.getElementById("horloge");

    function updateClock() {
        el.textContent = new Date().toLocaleTimeString("fr-FR");
    }

    updateClock();
    setInterval(updateClock, 1000);
}

/* ============================================================
   ENCARDS — Mise à jour automatique des montants
============================================================ */
function rafraichirMontants() {
    console.log("🔄 [index] Mise à jour des montants…");

    google.script.run.withSuccessHandler(data => {

        document.getElementById("montant-global").textContent = data.global + "$";
        document.getElementById("montant-illegale").textContent = data.illegale + "$";
        document.getElementById("montant-tequilalala").textContent = data.tequilalala + "$";
        document.getElementById("montant-downtown").textContent = data.downtown + "$";
        document.getElementById("montant-weazelnews").textContent = data.weazelnews + "$";

        console.log("🟩 [index] Montants mis à jour :", data);

    }).getMontantsCaisses();
}

/* ============================================================
   RESET / DECONNEXION
============================================================ */
function resetConnexion() {
    console.log("🔄 Réinitialisation de la connexion…");

    localStorage.removeItem("Nom");
    localStorage.removeItem("Prenom");

    location.reload();
}

/* ============================================================
   CHARGEMENT INITIAL
============================================================ */
window.addEventListener("load", () => {

    console.log("🟦 [index] Chargement initial…");

    verifierConnexion();   // Activation du système de connexion

    lancerHorloge();
    rafraichirMontants();
    setInterval(rafraichirMontants, 5000);

    openPage("interface_accueil");
});
</script>

<!-- ============================================================
     MENU DÉROULANT — VERSION PRO
============================================================ -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    console.log("🟦 [menu] Initialisation du menu déroulant…");

    const dropdown = document.getElementById("menu-principal");
    const btn = dropdown.querySelector(".dropdown-btn");

    btn.addEventListener("click", (e) => {
        e.stopPropagation();
        dropdown.classList.toggle("open");

        console.log(dropdown.classList.contains("open")
            ? "🟩 [menu] Menu ouvert"
            : "🟥 [menu] Menu fermé"
        );
    });

    document.addEventListener("click", () => {
        if (dropdown.classList.contains("open")) {
            dropdown.classList.remove("open");
            console.log("🟥 [menu] Menu fermé (clic extérieur)");
        }
    });
});
</script>

<!-- ============================================================
     🔥 SCRIPT POPUP — DÉPLACÉ ICI (COMME LE TCHAT)
============================================================ -->
<script>
function attendreGoogleScript(callback) {
    if (typeof google !== "undefined" && google.script && google.script.run) {
        callback();
    } else {
        console.log("⏳ google.script.run pas encore prêt…");
        setTimeout(() => attendreGoogleScript(callback), 50);
    }
}

function envoyerDemande() {
    const nom = document.getElementById("nom-input").value.trim();
    const prenom = document.getElementById("prenom-input").value.trim();

    console.log("CLICK OK");

    if (!nom || !prenom) {
        alert("Merci de remplir les deux champs.");
        return;
    }

    attendreGoogleScript(() => {
        console.log("🟩 google.script.run prêt → envoi au backend");

        google.script.run
            .withSuccessHandler(() => {
                localStorage.setItem("Nom", nom);
                localStorage.setItem("Prenom", prenom);

                alert("Votre demande a été envoyée. En attente de validation.");
                document.getElementById("popup-connexion").style.display = "none";
            })
            .withFailureHandler(err => {
                console.error("❌ ERREUR google.script.run :", err);
                alert("Erreur lors de l’envoi. Réessayez.");
            })
            .registerUserRequest(nom, prenom);
    });
}
</script>
