<style>
/* ********************************************************************
   FILE : style_nav.html
   MODULE : Navigation / Header / Menu déroulant
   VERSION : 1.0.0 — GTARP PRO
   AUTHOR : Stephen
   DESCRIPTION :
      - Header principal
      - Bouton menu
      - Menu déroulant (hover + clic)
      - Horloge
********************************************************************* */

.header {
    width: 100%;
    padding: 15px 25px;
    background: #161b22;
    border-bottom: 1px solid #30363d;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-title {
    flex: 1;
    text-align: center;
    font-size: 1.6rem;
    font-weight: 700;
    color: #58a6ff;
}

.header-nav {
    display: flex;
    align-items: center;
}

.dropdown {
    position: relative;
}

.dropdown-btn {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s ease;
}

.dropdown-btn:hover {
    background: #30363d;
}

.dropdown-menu {
    display: none;
    position: absolute;
    top: 45px;
    left: 0;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px 0;
    min-width: 180px;
    z-index: 20;
}

.dropdown:hover .dropdown-menu {
    display: block;
}

.dropdown.open .dropdown-menu {
    display: block;
}

.dropdown-menu button {
    width: 100%;
    padding: 12px 15px;
    background: transparent;
    border: none;
    color: #c9d1d9;
    text-align: left;
    cursor: pointer;
}

.dropdown-menu button:hover {
    background: #21262d;
}

.nav-active {
    background: #1f6feb !important;
    color: white !important;
}

.header-clock {
    min-width: 90px;
    text-align: right;
    color: #c9d1d9;
    font-size: 1rem;
}
</style>
